<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出攤資訊 | 小企鵝選物</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shop.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stalls-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .stall-card {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.2);
            transition: transform 0.3s ease;
            margin-bottom: 1.5rem;
        }
        .stall-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 182, 193, 0.4);
            background: rgba(255, 255, 255, 0.85);
        }
        .date-badge {
            background: #ffb6c1;
            color: white;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            min-width: 90px;
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.4);
        }
        .date-badge .month {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .date-badge .day {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
            margin-top: 0.2rem;
        }
        .stall-info {
            flex: 1;
        }
        .stall-info h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .stall-info p {
            color: var(--text-secondary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #db7093;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #ff69b4;
        }
        @media (max-width: 600px) {
            .stall-card {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            .stall-info p {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="stalls-container">
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> 回首頁
        </a>
        <header class="shop-header">
            <div class="logo-container">
                <span style="font-size: 2.5rem;">⛺</span>
                <h1>出攤資訊</h1>
            </div>
            <p>近期市集活動一覽表</p>
        </header>

        <main id="stallsList" class="stalls-list">
            <!-- Cards will be populated here -->
        </main>
        
        <footer class="shop-footer">
            <p>&copy; 2026 小企鵝選物 Little Penguin Select Shop.</p>
        </footer>
    </div>

    <script src="public-stalls.js"></script>
</body>
</html>
