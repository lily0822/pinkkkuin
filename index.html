<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小企鵝選物 | Little Penguin Select Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shop.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="shop-container">
        <header class="shop-header">
            <div class="logo-container">
                <span style="font-size: 2.5rem;">🐧</span>
                <h1>小企鵝選物</h1>
            </div>
            <p>Little Penguin Select Shop</p>
        </header>

        <main class="grid-container">
            <!-- Card 1: 連線時間 -->
            <a href="#" class="card pink-card">
                <div class="card-icon">
                    <i class="fa-solid fa-plane-departure"></i>
                </div>
                <h2>連線時間</h2>
                <p>最新日韓代購連線時程</p>
            </a>

            <!-- Card 2: 出攤資訊 -->
            <a href="dashboard.html" class="card peach-card">
                <div class="card-icon">
                    <i class="fa-solid fa-store"></i>
                </div>
                <h2>出攤資訊</h2>
                <p>近期市集擺攤活動紀錄</p>
            </a>

            <!-- Card 3: 現貨賣場 -->
            <a href="#" class="card rose-card">
                <div class="card-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
                <h2>現貨賣場</h2>
                <p>立即選購可愛代購小物</p>
            </a>

            <!-- Card 4: 社群與官方 -->
            <a href="#" class="card purple-card">
                <div class="card-icon">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <h2>社群與官方</h2>
                <p>關注我們獲得最新消息</p>
            </a>
        </main>
        
        <footer class="shop-footer">
            <p>&copy; 2026 小企鵝選物 Little Penguin Select Shop.</p>
        </footer>
    </div>
</body>
</html>
